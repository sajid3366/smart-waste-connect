services:
  # -------------------------
  # Auth Service
  # -------------------------
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./auth-service/.env
    volumes:
      - ./auth-service/logs:/app/logs # logs for Filebeat
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5001/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
  
  waste-service:
    build: ./waste-service
    container_name: waste-service
    ports:
    - "5002:5002"
    env_file:
      - ./waste-service/.env
    volumes:
      - ./waste-service/logs:/app/logs # logs for Filebeat
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5002/waste/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped


networks:
  app-network:
    driver: bridge

 